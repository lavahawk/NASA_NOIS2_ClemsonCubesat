services:
  db:
    image: postgis/postgis:17-3.5
    container_name: nois2-postgis
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-firedb}
      POSTGRES_USER: ${POSTGRES_USER:-fireuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-firepass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fireuser} -d ${POSTGRES_DB:-firedb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build:
      context: ./backend
    container_name: nois2-background-worker
    environment:
      FIRMS_MAP_KEY: ${FIRMS_MAP_KEY}
      DATABASE_DSN: postgresql://${POSTGRES_USER:-fireuser}:${POSTGRES_PASSWORD:-firepass}@db:5432/${POSTGRES_DB:-firedb}
      WORKER_POLL_INTERVAL_SECONDS: ${WORKER_POLL_INTERVAL_SECONDS:-300}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: ./backend
    container_name: nois2-fast-api
    command: ["python", "run_fast_api.py"]
    environment:
      DATABASE_DSN: postgresql://${POSTGRES_USER:-fireuser}:${POSTGRES_PASSWORD:-firepass}@db:5432/${POSTGRES_DB:-firedb}
      API_PAGE_SIZE: ${API_PAGE_SIZE:-1000}
      API_MAX_TIME_RANGE_DAYS: ${API_MAX_TIME_RANGE_DAYS:-10}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: noise2-vite-frontend
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    environment:
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - api
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

volumes:
  postgis_data:
